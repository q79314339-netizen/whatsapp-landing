<script>
// ===== 固定客服绑定逻辑 =====
const WA_POOL = [
  {name:"lewis", link:"https://wa.me/8619500182858", event:"WA_1"},
  {name:"lisa", link:"https://wa.me/8619748156826", event:"WA_2"},
  {name:"Diana", link:"https://wa.me/8613489920964", event:"WA_3"}
];

/* Cookie */

function getCookie(name){
const m=document.cookie.match(new RegExp('(^| )'+name+'=([^;]+)'));
return m?m[2]:null;
}

function setCookie(name,value){
document.cookie=name+"="+value+";path=/;max-age=2592000";
}

/* 客服分配 */

let waIndex=getCookie('wa_idx');

if(waIndex===null){
let lastIndex=parseInt(getCookie('last_assigned_idx'))||-1;
waIndex=(lastIndex+1)%WA_POOL.length;
setCookie('wa_idx',waIndex);
setCookie('last_assigned_idx',waIndex);
}

/* 跳转 WhatsApp */

function goWA(productName=""){

const wa=WA_POOL[waIndex];

const eventId='evt_'+Date.now();

fbq('track','Lead',{customer:wa.name},{eventID:eventId});

let message="Hello, I'm interested in your products.";

if(productName){
message="Hello, I'm interested in: "+productName;
}

window.location.href=wa.link+"?text="+encodeURIComponent(message);

}

/* 产品点击 */

function trackProduct(name){

const eventId='evt_'+Date.now();

fbq('track','ViewContent',{
content_name:name,
content_type:'product'
},{eventID:eventId});

fbq('track','AddToCart',{
content_name:name,
value:1,
currency:'USD'
});

goWA(name);

}

</script>
