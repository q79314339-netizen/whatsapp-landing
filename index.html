<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WhatsApp Contact</title>

<style>

body{
font-family:Arial;
background:#0d0d0d;
color:#fff;
display:flex;
justify-content:center;
padding:40px;
}

.container{
max-width:800px;
width:100%;
text-align:center;
}

h1{
color:#FFD700;
}

button{
background:#FFD700;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.product-gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
}

.product-gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
}

#floatWA{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#floatWA img{
width:35px;
}

</style>
</head>

<body>

<div class="container">

<h1>Factory Direct Supplier</h1>

<p>We produce bags, shoes, watches and clothing.</p>

<button onclick="goWA()">Contact WhatsApp</button>

<div class="product-gallery">

<img src="https://us.louisvuitton.com/images/is/image/lv/1/PP_VP_L/louis-vuitton-neverfull-mm--M46975_PM2_Front%20view.jpg" onclick="goWA()">

<img src="https://us.louisvuitton.com/images/is/image/lv/1/PP_VP_L/louis-vuitton-again--M25877_PM2_Front%20view.jpg" onclick="goWA()">

</div>

</div>

<div id="floatWA" onclick="goWA()">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</div>

<script>

/* ===== Facebook Pixel ===== */

!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;
n.loaded=!0;
n.version='2.0';
n.queue=[];
t=b.createElement(e);
t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}

(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

try{
fbq('init','853640044397925');
fbq('track','PageView');
}catch(e){}


/* ===== WhatsApp Pool ===== */

const WA_POOL=[

"https://api.whatsapp.com/send?phone=8619500182858&text=Hello%20I%20want%20more%20information",

"https://api.whatsapp.com/send?phone=8619748156826&text=Hello%20I%20want%20more%20information",

"https://api.whatsapp.com/send?phone=8613489920964&text=Hello%20I%20want%20more%20information"

];

const waIndex=Math.floor(Math.random()*WA_POOL.length);


/* ===== Go WhatsApp ===== */

function goWA(){

const link=WA_POOL[waIndex];

try{
if(typeof fbq!=="undefined"){
fbq('track','Contact');
}
}catch(e){}

window.open(link,'_blank');

}

</script>

</body>
</html>
